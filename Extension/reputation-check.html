<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberBase Reputation Check</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 18% 0%, #1b2740 0%, #0f1117 58%);
      color: #e2e8f0;
      font-family: system-ui, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      width: min(640px, 100%);
      background: rgba(22, 27, 38, 0.94);
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }
    .head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #2d3748;
      background: rgba(26, 32, 44, 0.78);
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #90cdf4;
      border: 1px solid rgba(66, 153, 225, 0.35);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
    }
    .body {
      padding: 20px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #cbd5e0;
      margin-bottom: 16px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(66, 153, 225, 0.25);
      border-top-color: #63b3ed;
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }
    .url-label {
      font-size: 10px;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.55px;
      margin-bottom: 6px;
    }
    .url-box {
      background: #202938;
      border: 1px solid #334155;
      border-radius: 7px;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #cbd5e1;
      word-break: break-all;
      margin-bottom: 14px;
    }
    .hint {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.55;
    }
    .hint strong {
      color: #e2e8f0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="panel" role="main" aria-live="polite">
    <div class="head">
      <span class="badge">CyberBase Web Guard</span>
      <span class="title">Real-Time URL Reputation Scan</span>
    </div>
    <div class="body">
      <div class="status">
        <span class="spinner" aria-hidden="true"></span>
        <span id="statusText">Checking URL reputation before page load...</span>
      </div>
      <div class="url-label">Requested URL</div>
      <div class="url-box" id="targetUrl">Preparing check...</div>
      <p class="hint">
        We compare this destination against <strong>organization blacklist</strong>, <strong>Google Safe Browsing</strong>,
        <strong>PhishTank</strong>, <strong>OpenPhish</strong>, and <strong>URLhaus</strong>.
      </p>
    </div>
  </main>
  <script src="reputation-check.js"></script>
</body>
</html>
