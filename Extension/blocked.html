<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Blocked - CyberBase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1117;
      color: #e2e8f0;
      font-family: system-ui, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a202c;
      border: 1px solid #742a2a;
      border-radius: 10px;
      padding: 40px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      color: #fc8181;
      background: rgba(229, 62, 62, 0.1);
      border: 1px solid rgba(229, 62, 62, 0.25);
      border-radius: 4px;
      padding: 3px 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      color: #718096;
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .url-label {
      font-size: 10px;
      font-weight: 600;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-align: left;
    }

    .url-box {
      background: #2d3748;
      border: 1px solid #3a4a5c;
      border-radius: 5px;
      padding: 9px 14px;
      font-family: monospace;
      font-size: 12px;
      color: #a0aec0;
      word-break: break-all;
      margin-bottom: 24px;
      text-align: left;
    }

    .back-btn {
      background: #2b6cb0;
      color: #fff;
      padding: 9px 24px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
      font-family: inherit;
    }

    .back-btn:hover { background: #2562a0; }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #3a4a5c;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">&#9632; CyberBase Web Guard</div>
    <h1>Access blocked by security policy</h1>
    <p class="subtitle">
      This site has been identified as a security risk.<br />
      Access was blocked automatically.
    </p>
    <p class="url-label">Blocked URL</p>
    <div class="url-box">{{ATTEMPTED_URL}}</div>
    <button class="back-btn" onclick="history.back()">&#8592; Go back</button>
    <p class="footer">CyberBase · Contact your IT administrator if you think this is an error.</p>
  </div>
</body>
</html>
