<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberBase Web Guard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 296px;
      background: #0f1117;
      color: #e2e8f0;
      font-family: system-ui, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2d3748;
      background: #161b26;
    }

    .header-shield {
      width: 28px;
      height: 28px;
      background: #2b6cb0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 12px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.2px;
    }

    .header-text p {
      font-size: 10px;
      color: #4a6a8a;
      margin-top: 1px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1a202c;
      border-bottom: 1px solid #2d3748;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .dot.on  { background: #38a169; box-shadow: 0 0 5px rgba(56, 161, 105, 0.6); }
    .dot.off { background: #e53e3e; box-shadow: 0 0 5px rgba(229, 62, 62, 0.5); }

    .status-label {
      font-size: 11px;
      color: #718096;
    }

    .alert-band {
      background: #2d1515;
      color: #fc8181;
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid #742a2a;
      display: none;
    }

    .alert-band.visible { display: block; }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #2d3748;
    }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      background: #2d3748;
      border: 1px solid #3a4a5c;
      border-radius: 4px;
      color: #e2e8f0;
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input[type="text"]:focus { border-color: #4299e1; }
    input[type="text"]::placeholder { color: #4a5568; }

    .btn-save {
      background: #2b6cb0;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-save:hover { background: #2562a0; }

    .hint {
      font-size: 10px;
      margin-top: 5px;
      min-height: 14px;
    }

    .hint.error   { color: #fc8181; }
    .hint.success { color: #68d391; }

    .meta {
      padding: 10px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }

    .meta-key { color: #4a6a8a; }
    .meta-val { color: #718096; font-family: monospace; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-shield">&#9632;</div>
    <div class="header-text">
      <h1>CyberBase Web Guard</h1>
      <p>Zero-trust browser protection</p>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span class="status-label" id="statusText">Loading...</span>
  </div>

  <div class="alert-band" id="alertBand">
    Not configured - enter your employee ID
  </div>

  <div class="section">
    <div class="field-label">Employee ID</div>
    <div class="input-row">
      <input type="text" id="empIdInput" placeholder="e.g. EMP001" maxlength="64" autocomplete="off" spellcheck="false" />
      <button class="btn-save" id="saveBtn">Save</button>
    </div>
    <div class="hint" id="fieldHint"></div>
  </div>

  <div class="meta">
    <div class="meta-row">
      <span class="meta-key">Last poll</span>
      <span class="meta-val" id="lastPoll">-</span>
    </div>
    <div class="meta-row">
      <span class="meta-key">Version</span>
      <span class="meta-val" id="extVersion">-</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
